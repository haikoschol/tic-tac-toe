<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toe vs Computer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;700;800&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel game-panel" aria-labelledby="game-title">
        <header class="game-header">
          <p class="eyebrow">Single Player</p>
          <h1 id="game-title">Tic-Tac-Toe</h1>
          <p class="subtitle">You are X. Computer is O.</p>
        </header>

        <p id="status" class="status" role="status" aria-live="polite"></p>

        <div id="board" class="board" role="grid" aria-label="Tic-Tac-Toe board">
          <button class="cell" type="button" data-index="0" aria-label="Row 1 Column 1"></button>
          <button class="cell" type="button" data-index="1" aria-label="Row 1 Column 2"></button>
          <button class="cell" type="button" data-index="2" aria-label="Row 1 Column 3"></button>
          <button class="cell" type="button" data-index="3" aria-label="Row 2 Column 1"></button>
          <button class="cell" type="button" data-index="4" aria-label="Row 2 Column 2"></button>
          <button class="cell" type="button" data-index="5" aria-label="Row 2 Column 3"></button>
          <button class="cell" type="button" data-index="6" aria-label="Row 3 Column 1"></button>
          <button class="cell" type="button" data-index="7" aria-label="Row 3 Column 2"></button>
          <button class="cell" type="button" data-index="8" aria-label="Row 3 Column 3"></button>
        </div>

        <div class="controls">
          <button id="new-game" class="action primary" type="button">New Game</button>
          <button id="reset-scores" class="action secondary" type="button">Reset Scores</button>
        </div>
      </section>

      <aside id="scores" class="panel score-panel" aria-label="Scoreboard">
        <h2>Scoreboard</h2>
        <dl class="score-grid">
          <div class="score-item">
            <dt>You (X)</dt>
            <dd id="score-player">0</dd>
          </div>
          <div class="score-item">
            <dt>Computer (O)</dt>
            <dd id="score-computer">0</dd>
          </div>
          <div class="score-item">
            <dt>Draws</dt>
            <dd id="score-draws">0</dd>
          </div>
        </dl>
      </aside>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
